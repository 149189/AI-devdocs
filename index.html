<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>AI DevDocs - Complete AI Knowledge Base</title>
    <meta name="description" content="Comprehensive encyclopedia of AI, Machine Learning, Deep Learning, Generative AI, LangChain, Frameworks, and 179+ topics covering the full AI/ML ecosystem." />
    <meta name="keywords" content="AI, artificial intelligence, machine learning, deep learning, neural networks, transformers, LLMs, generative AI, LangChain, RAG, NLP, computer vision, reinforcement learning, frameworks, PyTorch, TensorFlow, MLOps" />
    <meta name="author" content="AI DevDocs" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" id="canonicalLink" href="" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI DevDocs" />
    <meta property="og:title" id="ogTitle" content="AI DevDocs - Complete AI Knowledge Base" />
    <meta property="og:description" id="ogDescription" content="Comprehensive encyclopedia covering 179+ AI topics: ML, Deep Learning, GenAI, LangChain, Frameworks, and more." />
    <meta property="og:url" id="ogUrl" content="" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" id="twTitle" content="AI DevDocs - Complete AI Knowledge Base" />
    <meta name="twitter:description" id="twDescription" content="Comprehensive encyclopedia covering 179+ AI topics: ML, Deep Learning, GenAI, LangChain, Frameworks, and more." />

    <!-- JSON-LD Structured Data (base - updated dynamically per topic) -->
    <script type="application/ld+json" id="jsonLd">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI DevDocs",
      "description": "Complete AI Knowledge Base covering 179+ topics across Machine Learning, Deep Learning, Generative AI, LangChain, Frameworks, and more.",
      "url": "",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "{search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Initialize global content store BEFORE content files load -->
    <script>window.AI_DOCS = {};</script>
  </head>
  <body>
    <!-- Mobile Header -->
    <header class="mobile-header">
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <span class="mobile-title">AI DevDocs</span>
      <button class="theme-toggle-mobile" id="themeToggleMobile" aria-label="Toggle dark mode">
        <span class="theme-icon">&#9790;</span>
      </button>
    </header>

    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo-row">
            <h1 class="logo">AI DevDocs</h1>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
              <span class="theme-icon">&#9790;</span>
            </button>
          </div>
          <p class="tagline">Complete AI Knowledge Base</p>
          <input type="text" class="search-box" id="searchInput" placeholder="Search 165+ topics..." autocomplete="off" />
          <div class="topic-stats" id="topicStats"></div>
        </div>
        <nav class="sidebar-content" id="sidebarNav"></nav>
      </aside>

      <!-- Overlay for mobile -->
      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <!-- Main Content -->
      <main class="main-content" id="mainContent">
        <div class="content-wrapper">
          <!-- Breadcrumb -->
          <nav class="breadcrumb-nav" id="breadcrumb" style="display:none">
            <span id="breadcrumbText"></span>
          </nav>

          <!-- Ad Slot: Top (hidden until AdSense activated) -->
          <div class="ad-slot" id="adSlotTop" data-ad-position="top"></div>

          <div id="docContainer">
            <div class="welcome-screen">
              <h2>Welcome to AI DevDocs</h2>
              <p class="welcome-sub">Your complete encyclopedia of Artificial Intelligence</p>
              <div class="welcome-grid" id="welcomeGrid"></div>
              <p class="welcome-hint">Select a topic from the sidebar or search to get started</p>
            </div>
          </div>

          <!-- Ad Slot: Bottom (hidden until AdSense activated) -->
          <div class="ad-slot" id="adSlotBottom" data-ad-position="bottom"></div>

          <!-- Back to top -->
          <button class="back-to-top" id="backToTop" aria-label="Back to top">&uarr;</button>
        </div>
      </main>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
        <a href="contact.html">Contact</a>
        <a href="admin.html">Admin</a>
      </div>
    </footer>

    <!-- Content Files -->
    <script src="content/01-foundations.js"></script>
    <script src="content/02-machine-learning.js"></script>
    <script src="content/03-neural-networks.js"></script>
    <script src="content/04-deep-learning.js"></script>
    <script src="content/05-transformers-llms.js"></script>
    <script src="content/06-generative-ai.js"></script>
    <script src="content/07-nlp-advanced.js"></script>
    <script src="content/08-computer-vision.js"></script>
    <script src="content/09-reinforcement.js"></script>
    <script src="content/10-frameworks.js"></script>
    <script src="content/11-langchain-agents.js"></script>
    <script src="content/12-languages.js"></script>
    <script src="content/13-mlops-infra.js"></script>
    <script src="content/14-ethics.js"></script>
    <script src="content/15-emerging.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
